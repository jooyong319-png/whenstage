<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>오프라인 · WhenStage</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom));
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      text-align: center;
      background: #f6f7f9;
      color: #1a1d24;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f1115; color: #e6e6e6; }
      .hint { color: #888; }
      .retry { background: #ff5c8f; color: #2b0013; }
    }
    .icon {
      width: 64px; height: 64px;
      display: grid; place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff3d78, #7c3aed);
      color: #fff;
      margin-bottom: 0.6rem;
    }
    h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
    .hint { color: #6b7280; font-size: 0.92rem; line-height: 1.5; max-width: 22rem; }
    .retry {
      margin-top: 1rem;
      border: none;
      background: #ff3d78;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.7rem 1.5rem;
      border-radius: 999px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 2v4M16 2v4" /><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M3 10h18" />
    </svg>
  </div>
  <h1>오프라인 상태예요</h1>
  <p class="hint">인터넷 연결이 끊겼어요. 연결을 확인한 뒤 다시 시도해 주세요. 공연·발매 일정은 온라인일 때 최신으로 보여드려요.</p>
  <button class="retry" onclick="location.reload()">다시 시도</button>
</body>
</html>
